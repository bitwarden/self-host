name: Build Bitwarden lite

on:
  push:
    paths:
      - "bitwarden-lite/**"
      - ".github/workflows/build-bitwarden-lite.yml"
    branches:
      - main
  workflow_dispatch:
    inputs:
      self_host_repo_ref:
        description: "Self-host ref to use for checkout (Default: current ref)"
        type: string
        required: false
      server_branch:
        description: "Server branch name (examples: 'main', 'rc', 'feature/sm')"
        type: string
        default: main
      web_branch:
        description: "Web client branch name (examples: 'main', 'rc', 'feature/sm')"
        type: string
        default: main
      use_latest_core_version:
        description: "Use the latest core version from version.json instead of branch"
        type: boolean
        default: false
      use_latest_web_version:
        description: "Use the latest web version from version.json instead of branch"
        type: boolean
        default: false
  workflow_call:
    inputs:
      self_host_repo_ref:
        description: "Self-host ref to use for checkout (Default: current ref)"
        type: string
        required: false
      server_branch:
        description: "Server branch name (examples: 'main', 'rc', 'feature/sm')"
        type: string
        default: main
      web_branch:
        description: "Web client branch name (examples: 'main', 'rc', 'feature/sm')"
        type: string
        default: main
      use_latest_core_version:
        description: "Use the latest core version from version.json instead of branch"
        type: boolean
        default: false
      use_latest_web_version:
        description: "Use the latest web version from version.json instead of branch"
        type: boolean
        default: false
  pull_request:
    paths:
      - ".github/workflows/build-bitwarden-lite.yml"
      - "bitwarden-lite/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-docker:
    name: Build Docker image
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    permissions:
      id-token: write
      packages: write
      security-events: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          ref: ${{ inputs.self_host_repo_ref || github.ref }}
          persist-credentials: false

      - name: Resolve refs and SHAs
        id: resolve-refs
        env:
          SERVER_BRANCH: ${{ inputs.server_branch }}
          USE_LATEST_CORE_VERSION: ${{ inputs.use_latest_core_version }}
          WEB_BRANCH: ${{ inputs.web_branch }}
          USE_LATEST_WEB_VERSION: ${{ inputs.use_latest_web_version }}
        run: |
          # Resolve server ref
          if [[ "$USE_LATEST_CORE_VERSION" == "true" ]]; then
            CORE_VERSION=$(jq -r '.versions.coreVersion' version.json)
            echo "Server version from version.json: $CORE_VERSION"
            SERVER_REF="refs/tags/v$CORE_VERSION"
          elif [[ -z "${SERVER_BRANCH}" ]]; then
            SERVER_REF="refs/heads/main"
          else
            SERVER_REF="refs/heads/${SERVER_BRANCH#refs/heads/}"
          fi

          # Resolve web ref
          if [[ "$USE_LATEST_WEB_VERSION" == "true" ]]; then
            WEB_VERSION=$(jq -r '.versions.webVersion' version.json)
            echo "Web version from version.json: $WEB_VERSION"
            WEB_REF="refs/tags/web-v$WEB_VERSION"
          elif [[ -z "${WEB_BRANCH}" ]]; then
            WEB_REF="refs/heads/main"
          else
            WEB_REF="refs/heads/${WEB_BRANCH#refs/heads/}"
          fi

          # Always push to ACR. Additionally push to GHCR for rc, hotfix-rc, and version tags.
          BRANCH_NAME="${SERVER_REF#refs/heads/}"
          if [[ "$SERVER_REF" =~ ^refs/tags/ ]] || [[ "$BRANCH_NAME" == "rc" ]] || [[ "$BRANCH_NAME" == "hotfix-rc" ]]; then
            PUSH_TO_GHCR=true
          else
            PUSH_TO_GHCR=false
          fi

          # Resolve commit SHAs
          SERVER_SHA=$(git ls-remote https://github.com/bitwarden/server.git "$SERVER_REF" | head -1 | cut -c1-7)
          if [[ -z "$SERVER_SHA" ]]; then
            echo "ERROR: Could not resolve SHA for server ref: $SERVER_REF"
            exit 1
          fi

          WEB_SHA=$(git ls-remote https://github.com/bitwarden/clients.git "$WEB_REF" | head -1 | cut -c1-7)
          if [[ -z "$WEB_SHA" ]]; then
            echo "ERROR: Could not resolve SHA for web ref: $WEB_REF"
            exit 1
          fi

          echo "server_ref=$SERVER_REF" >> "$GITHUB_OUTPUT"
          echo "web_ref=$WEB_REF" >> "$GITHUB_OUTPUT"
          echo "push_to_ghcr=$PUSH_TO_GHCR" >> "$GITHUB_OUTPUT"
          echo "server_sha=$SERVER_SHA" >> "$GITHUB_OUTPUT"
          echo "web_sha=$WEB_SHA" >> "$GITHUB_OUTPUT"

      - name: Check secrets
        id: check-secrets
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
        run: |
          if [[ -n "$AZURE_CLIENT_ID" ]]; then
            echo "has_secrets=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_secrets=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up QEMU emulators
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to Azure
        if: steps.check-secrets.outputs.has_secrets == 'true'
        uses: bitwarden/gh-actions/azure-login@main
        with:
          subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          tenant_id: ${{ secrets.AZURE_TENANT_ID }}
          client_id: ${{ secrets.AZURE_CLIENT_ID }}

      - name: Log in to ACR
        if: steps.check-secrets.outputs.has_secrets == 'true'
        run: az acr login -n bitwardenprod

      - name: Login to GitHub Container Registry
        if: steps.check-secrets.outputs.has_secrets == 'true' && steps.resolve-refs.outputs.push_to_ghcr == 'true'
        uses: docker/login-action@184bdaa0721073962dff0199f1fb9940f07167d1 # v3.5.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Docker tags
        id: generate-tags
        env:
          SERVER_REF: ${{ steps.resolve-refs.outputs.server_ref }}
          WEB_REF: ${{ steps.resolve-refs.outputs.web_ref }}
        run: |
          # Generate server image tag
          if [[ $SERVER_REF =~ ^refs/tags/v(.+)$ ]]; then
            IMAGE_TAG="${BASH_REMATCH[1]}"
          else
            IMAGE_TAG=$(echo "${SERVER_REF#refs/heads/}" | \
              tr '[:upper:]' '[:lower:]' | \
              sed -E 's/[^a-z0-9._-]+/-/g; s/-+/-/g; s/^-+|-+$//g' | \
              cut -c1-128 | \
              sed -E 's/[.-]$//')
          fi
          [[ "$IMAGE_TAG" == "main" ]] && IMAGE_TAG=dev

          if [[ -z "$IMAGE_TAG" ]]; then
            echo "ERROR: Failed to generate valid IMAGE_TAG from SERVER_REF: $SERVER_REF"
            exit 1
          fi

          # Generate web image tag and registry
          if [[ $WEB_REF =~ ^refs/tags/web-v(.+)$ ]]; then
            WEB_TAG="${BASH_REMATCH[1]}"
            WEB_IMAGE="ghcr.io/bitwarden/web"
          else
            WEB_TAG=$(echo "${WEB_REF#refs/heads/}" | \
              tr '[:upper:]' '[:lower:]' | \
              sed -E 's/[^a-z0-9._-]+/-/g; s/-+/-/g; s/^-+|-+$//g' | \
              cut -c1-128 | \
              sed -E 's/[.-]$//')
            [[ "$WEB_TAG" == "main" ]] && WEB_TAG=dev
            WEB_IMAGE="ghcr.io/bitwarden/web-dev"
          fi

          echo "Using server tag: $IMAGE_TAG, web tag: $WEB_TAG"
          echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "web_tag=${WEB_TAG}" >> "$GITHUB_OUTPUT"
          echo "web_image=${WEB_IMAGE}" >> "$GITHUB_OUTPUT"

      - name: Generate image tags
        id: image-tags
        env:
          SERVER_REF: ${{ steps.resolve-refs.outputs.server_ref }}
          WEB_REF: ${{ steps.resolve-refs.outputs.web_ref }}
          SERVER_TAG: ${{ steps.generate-tags.outputs.image_tag }}
          SERVER_SHA: ${{ steps.resolve-refs.outputs.server_sha }}
          WEB_SHA: ${{ steps.resolve-refs.outputs.web_sha }}
          PUSH_TO_GHCR: ${{ steps.resolve-refs.outputs.push_to_ghcr }}
        run: |
          # Determine lite image tag
          if [[ "$SERVER_REF" =~ ^refs/tags/ ]]; then
            LITE_TAG="${SERVER_TAG}"
          elif [[ "$SERVER_REF" == "refs/heads/main" && "$WEB_REF" == "refs/heads/main" ]]; then
            LITE_TAG="dev"
          else
            LITE_TAG="server-${SERVER_SHA}-web-${WEB_SHA}"
          fi

          if [[ -z "$LITE_TAG" ]]; then
            echo "ERROR: Failed to generate valid LITE_TAG"
            exit 1
          fi

          # Determine registry tags
          TAGS="bitwardenprod.azurecr.io/lite:${LITE_TAG}"
          if [[ "$PUSH_TO_GHCR" == "true" ]]; then
            TAGS="${TAGS},ghcr.io/bitwarden/lite:${LITE_TAG}"
          fi

          echo "Using lite tag: $LITE_TAG"
          echo "lite_tag=${LITE_TAG}" >> "$GITHUB_OUTPUT"
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"
          echo "acr_image=bitwardenprod.azurecr.io/lite:${LITE_TAG}" >> "$GITHUB_OUTPUT"

      - name: Log build configuration
        env:
          IMAGE_TAGS: ${{ steps.image-tags.outputs.tags }}
          SERVER_REF: ${{ steps.resolve-refs.outputs.server_ref }}
          SERVER_SHA: ${{ steps.resolve-refs.outputs.server_sha }}
          SERVER_TAG: ${{ steps.generate-tags.outputs.image_tag }}
          WEB_REF: ${{ steps.resolve-refs.outputs.web_ref }}
          WEB_SHA: ${{ steps.resolve-refs.outputs.web_sha }}
          WEB_IMAGE: ${{ steps.generate-tags.outputs.web_image }}
          WEB_TAG: ${{ steps.generate-tags.outputs.web_tag }}
        run: |
          echo "### Build Configuration" >> $GITHUB_STEP_SUMMARY
          echo "- **Lite image:** \`${IMAGE_TAGS}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Server:** ref=\`${SERVER_REF}\` sha=\`${SERVER_SHA}\` tag=\`${SERVER_TAG}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Web:** ref=\`${WEB_REF}\` sha=\`${WEB_SHA}\` image=\`${WEB_IMAGE}:${WEB_TAG}\`" >> $GITHUB_STEP_SUMMARY

      - name: Build and push Docker image
        id: build-docker
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: .
          file: bitwarden-lite/Dockerfile
          platforms: |
            linux/amd64,
            linux/arm/v7,
            linux/arm64/v8
          push: ${{ steps.check-secrets.outputs.has_secrets == 'true' }}
          tags: ${{ steps.image-tags.outputs.tags }}
          build-args: |
            SERVER_TAG=${{ steps.generate-tags.outputs.image_tag }}
            WEB_IMAGE=${{ steps.generate-tags.outputs.web_image }}
            WEB_TAG=${{ steps.generate-tags.outputs.web_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=min

      - name: Install Cosign
        if: steps.check-secrets.outputs.has_secrets == 'true'
        uses: sigstore/cosign-installer@faadad0cce49287aee09b3a48701e75088a2c6ad # v4.0.0

      - name: Sign image with Cosign
        if: steps.check-secrets.outputs.has_secrets == 'true'
        env:
          DIGEST: ${{ steps.build-docker.outputs.digest }}
          PUSH_TO_GHCR: ${{ steps.resolve-refs.outputs.push_to_ghcr }}
          ACR_IMAGE: ${{ steps.image-tags.outputs.acr_image }}
          GHCR_IMAGE: ghcr.io/bitwarden/lite:${{ steps.image-tags.outputs.lite_tag }}
        run: |
          cosign sign --yes "${ACR_IMAGE}@${DIGEST}"
          if [[ "$PUSH_TO_GHCR" == "true" ]]; then
            cosign sign --yes "${GHCR_IMAGE}@${DIGEST}"
          fi

      - name: Scan Docker image
        if: steps.check-secrets.outputs.has_secrets == 'true'
        id: container-scan
        uses: anchore/scan-action@f6601287cdb1efc985d6b765bbf99cb4c0ac29d8 # v7.0.0
        with:
          image: ${{ steps.image-tags.outputs.acr_image }}
          fail-build: false
          output-format: sarif

      - name: Upload Grype results to GitHub
        if: steps.check-secrets.outputs.has_secrets == 'true'
        uses: github/codeql-action/upload-sarif@4e94bd11f71e507f7f87df81788dff88d1dacbfb # v4.31.0
        with:
          sarif_file: ${{ steps.container-scan.outputs.sarif }}
          sha: ${{ contains(github.event_name, 'pull_request') && github.event.pull_request.head.sha || github.sha }}
          ref: ${{ contains(github.event_name, 'pull_request') && format('refs/pull/{0}/head', github.event.pull_request.number) || github.ref }}

      - name: Log out of registries
        if: always()
        run: |
          docker logout ghcr.io || true
          az acr logout -n bitwardenprod || true
