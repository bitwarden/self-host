services:
  maildev:
    image: maildev/maildev:latest
    container_name: maildev
    restart: unless-stopped
    ports:
      # Web UI - open http://localhost:1080 to view captured emails
      - "1080:1080"
      - "1025:1025"
    environment:
      MAILDEV_WEB_PORT: 1080
      MAILDEV_SMTP_PORT: 1025
